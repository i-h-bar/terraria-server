services:
  terraria-server:
    build:
      context: ./terraria-server
      args:
        TERRARIA_VERSION: ${TERRARIA_VERSION:-1456}
    image: terraria-server:latest
    container_name: terraria-server
    restart: unless-stopped
    volumes:
      - ${TERRARIA_WORLDS_DIR}:/root/.local/share/Terraria/Worlds/
    environment:
      - TERRARIA_WORLD=${TERRARIA_WORLD:-}
      - TERRARIA_MAX_PLAYERS=${TERRARIA_MAX_PLAYERS:-16}
      - TERRARIA_PORT=7777
    networks:
      terraria_network:
        ipv4_address: ${TERRARIA_SERVER_IP:-172.18.0.5}
    stdin_open: true
    tty: true

  tcp-guard:
    build:
      context: ./tcp-guard
    image: tcp-guard:latest
    container_name: tcp-guard
    restart: unless-stopped
    depends_on:
      - terraria-server
    environment:
      - TCP_GUARD_PROXY_TIMEOUT=${TCP_GUARD_PROXY_TIMEOUT:-30m}
      - TCP_GUARD_CONNECT_TIMEOUT=${TCP_GUARD_CONNECT_TIMEOUT:-5s}
      - TCP_GUARD_PREREAD_TIMEOUT=${TCP_GUARD_PREREAD_TIMEOUT:-5s}
    networks:
      terraria_network:
        ipv4_address: ${TCP_GUARD_IP:-172.18.0.10}

  backups:
    image: gitfrog/terraria-backups:latest
    container_name: terraria-backups
    restart: "no"
    volumes:
      - ${TERRARIA_WORLDS_DIR}:${TERRARIA_WORLDS_DIR}:ro
      - ${BACKUP_WORLDS_DIR:-/opt/terraria/backups}:${BACKUP_WORLDS_DIR:-/opt/terraria/backups}
    environment:
      - TERRARIA_WORLDS_DIR=${TERRARIA_WORLDS_DIR}
      - BACKUP_WORLDS_DIR=${BACKUP_WORLDS_DIR:-/opt/terraria/backups}
      - MAX_SAVES=${MAX_SAVES:-10}
      - RUST_LOG=${RUST_LOG:-info}

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit-tunnel
    restart: unless-stopped
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}
    networks:
      - terraria_network

networks:
  terraria_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.18.0.0/24}
