services:
  terraria-server:
    build:
      context: .
      args:
        TERRARIA_VERSION: ${TERRARIA_VERSION:-1455}
    image: terraria-server:latest
    container_name: terraria-server
    restart: unless-stopped
    ports:
      - "7777:7777"
    volumes:
      - ${TERRARIA_WORLDS_DIR}:/root/.local/share/Terraria/Worlds/
    environment:
      - TERRARIA_WORLD=${TERRARIA_WORLD:-}
      - TERRARIA_MAX_PLAYERS=${TERRARIA_MAX_PLAYERS:-16}
      - TERRARIA_PORT=7777
    networks:
      terraria_network:
        ipv4_address: 172.18.0.10
    stdin_open: true
    tty: true

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: playit-tunnel
    restart: unless-stopped
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}
    networks:
      - terraria_network

networks:
  terraria_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24